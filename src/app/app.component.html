<Header
  [sezione-corrente]="sezioneCorrente()"
  (naviga)="sezioniPagina.impostaSezioneCorrente($event)"
  class="flex-col"
></Header>
<SezionePrincipale
  id="principale"
  appSezionePagina="principale"
  class="flex-col espandi"
/>

@defer (on viewport; hydrate on viewport; prefetch on idle) {
<SezioneConoscenze id="conoscenze" appSezionePagina="conoscenze" class="espandi" />
} @placeholder {
<section
  id="conoscenze"
  appSezionePagina="conoscenze"
  class="espandi placeholder-sezione"
  aria-hidden="true"
>
  <span class="placeholder-scheletro" aria-hidden="true"></span>
</section>
} @defer (on viewport; hydrate on viewport; prefetch on idle) {
<SezioneProgetti
  id="progetti"
  appSezionePagina="progetti"
  class="flex-col espandi"
/>
} @placeholder {
<section
  id="progetti"
  appSezionePagina="progetti"
  class="flex-col espandi placeholder-sezione"
  aria-hidden="true"
>
  <span class="placeholder-scheletro" aria-hidden="true"></span>
</section>
} @defer (on idle; hydrate on idle) {
<FooterContatti id="contatti" appSezionePagina="contatti" />
} @placeholder {
<section
  id="contatti"
  appSezionePagina="contatti"
  class="placeholder-footer"
  aria-hidden="true"
>
  <span class="placeholder-scheletro" aria-hidden="true"></span>
</section>
}
<svg xmlns="http://www.w3.org/2000/svg">
  <mask id="maschera-cornice">
    <rect x="0" y="0" width="100%" height="100%" fill="#FFF" />
    <rect interno fill="#000" #interno />
  </mask>
</svg>
<div class="overlay-iniziale">
  <div class="rettangolo-bordo"></div>
</div>
